<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/stack.css') }}">
</head>
<body>
  <div class="stack-root">
    <header class="stack-header-row">
      <div class="stack-header-spacer"></div>
      <div class="stack-header-title">{{ app_title }}</div>
      <div class="stack-header-actions">
        <button id="login-btn" class="stack-login-btn" type="button">Log In</button>
        <button id="logout-btn" class="stack-logout-btn" type="button" disabled>Logout</button>
      </div>
    </header>

    <main class="stack-main-row">
      <section class="stack-left-col">
        <div class="stack-agent-card">
          <div class="stack-agent-title">Stack Agent</div>
          <div id="agent-text" class="stack-agent-text">How can I help you today?</div>
        </div>
        <div class="stack-left-actions">
          <button id="meeting-prep-btn" class="stack-main-btn" type="button" disabled>Meeting Prep</button>
          <div class="stack-btn-spacer-sm"></div>
          <button id="my-companies-btn" class="stack-main-btn" type="button" disabled>My Companies</button>
          <div class="stack-btn-spacer-sm"></div>
          <button id="opp-insights-btn" class="stack-main-btn" type="button" disabled>Opp Insights (not ready)</button>
          <div class="stack-btn-spacer-sm"></div>
          <button id="opp-search-btn" class="stack-main-btn" type="button" disabled>Opp Search (not ready)</button>
        </div>
      </section>

      <section class="stack-right-col">
        <div class="stack-panel">
          <div id="output-title" class="stack-panel-title">Output</div>
          <div id="output-area" class="stack-output-message">Click Log In or one of the action buttons to display results here.</div>
        </div>
      </section>
    </main>

    <section id="debug-shell" class="stack-debug-shell" {% if not debug_userid %}style="display:none"{% endif %}>
      <div class="stack-panel">
        <div class="stack-panel-title">DEBUG</div>
        <div id="debug-area" class="stack-output-message">Debug output will appear here after login.</div>
      </div>
    </section>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
